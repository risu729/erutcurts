name: Google Java Format

on:
  push:
  pull_request:
  
  workflow_dispatch:

jobs:
  format:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
   
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: 17
          distribution: zulu
          cache: maven
  
      - name: Google Java Format
        uses: axel-op/googlejavaformat-action@v3.6.0
